<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d0710"/>
  <!-- VR headset shape -->
  <rect x="4" y="11" width="24" height="13" rx="3" fill="#b45cfd"/>
  <!-- Lens left -->
  <rect x="6" y="13.5" width="8" height="8" rx="2" fill="#0d0710"/>
  <!-- Lens right -->
  <rect x="18" y="13.5" width="8" height="8" rx="2" fill="#0d0710"/>
  <!-- Bridge between lenses -->
